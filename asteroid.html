<body>
	<canvas width="1500" height="500" id="canv"></canvas>
	<h1 id="score">Score: 0</h1>
</body>
<script>
	const canvas = document.getElementById("canv");
	const ctx = canvas.getContext("2d");
	const cellSize = 50;
	let walls = []
	let px = 50
	let py = 50
	let wx = 0
	let wy = 50
	let gameover = false
	let scoreEl = document.getElementById("score");
	let score = 0;
	let bullets = [];
	let ammo = 3;
	let hp = 3;
	let medkits = [];
	const bulletSize = 30;
	let reloading = false;
	const wallImg = new Image();
	wallImg.src = "asteroid.png";
	ctx.imageSmoothingEnabled = false;
	const playerImg = new Image();
	playerImg.src = "player.png";
	const bulletImg = new Image();
	bulletImg.src = "bullet.gif";
	const medkitImg = new Image();
medkitImg.src = "repair.png";


	function drawp(){
    let size = cellSize * 1.2;
    let offset = (cellSize - size) / 2;

    ctx.drawImage(playerImg, px + offset, py + offset, size, size);
}

	function draww(){
    for (let i = 0; i < walls.length; i++) {
        ctx.drawImage(wallImg, walls[i].wx, walls[i].wy, cellSize, cellSize);
    }
}
function drawBullets(){
    for (let b of bullets){
        if (b.justSpawned) continue;

        ctx.drawImage(
            bulletImg,
            b.x - 15,
            b.y - 15,
            30,
            30
        );
    }
}
function drawMedkits(){
    for (let m of medkits){
        ctx.drawImage(medkitImg, m.x, m.y, cellSize, cellSize);
    }
}

	function movew(){
		for (let i = 0; i < walls.length; i++) {
		walls[i].wx -= cellSize/2;
	}walls = walls.filter(w => w.wx >= 0);
	}
	function moveBullets(){
    for (let b of bullets){
        b.x += 20;

        if (b.justSpawned){
            b.justSpawned = false;
        }
    }
}
function moveMedkits(){
    for (let m of medkits){
        m.x -= cellSize / 2;
    }
    medkits = medkits.filter(m => m.x >= 0);
}
	let wall = {
		wx:canvas.width - cellSize,
		wy:0
	}

	function spawnw(){
    let wy = Math.floor(Math.random() * (canvas.height / cellSize)) * cellSize;

    if (wy === py) return;

    walls.push({
        wx: canvas.width - cellSize,
        wy: wy
    });
}

function spawnMedkit(){
    if (hp >= 3) return;

    medkits.push({
        x: canvas.width - cellSize,
        y: Math.floor(Math.random() * (canvas.height / cellSize)) * cellSize
    });
}

	function colision(){
    for (let i = walls.length - 1; i >= 0; i--) {
        let w = walls[i];

        if (
            px < w.wx + cellSize &&
            px + cellSize > w.wx &&
            py < w.wy + cellSize &&
            py + cellSize > w.wy
        ){
            walls.splice(i, 1);
            hp--;

            if (hp <= 0){
                gameover = true;
            }

            break;
        }
    }
}
	function bulletCollision(){
    bullets = bullets.filter(b => {
        for (let w of walls){
            if (
                b.x < w.wx + cellSize &&
                b.x + bulletSize > w.wx &&
                b.y < w.wy + cellSize &&
                b.y + bulletSize > w.wy
            ){
                walls.splice(walls.indexOf(w), 1);
                score += 50;
                return false;
            }
        }
        return true;
    });
}
function medkitCollision(){
    for (let i = 0; i < medkits.length; i++){
        let m = medkits[i];

        if (
            px < m.x + cellSize &&
            px + cellSize > m.x &&
            py < m.y + cellSize &&
            py + cellSize > m.y
        ){
            medkits.splice(i, 1);
            hp++;
        }
    }
}
function reload(){
    if (ammo <= 0 && !reloading){
        reloading = true;
        setTimeout(() => {
            ammo = 3;
            reloading = false;
        }, 5000);
    }
}

	function update(){
    if (gameover) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    movew();
    moveBullets();
    moveMedkits();

    colision();
    bulletCollision();
    medkitCollision();

    draww();
    drawMedkits();
    drawBullets();
    drawp();

    reload();

    if (!gameover) score++;

    scoreEl.textContent = `Score: ${score} | HP: ${hp} | Ammo: ${ammo}`;
}

	document.addEventListener("keydown", function (event) {
    if (event.key === "ArrowRight" && ammo > 0) {
        bullets.push({
    x: px + cellSize / 2,
    y: py + cellSize / 2,
    justSpawned: true
});
        ammo--;
    }
});
	document.addEventListener("keydown", function (event) {
				if (event.key === "ArrowUp" && py > 0) py -= 50;
				if (event.key === "ArrowDown" && py + cellSize < canvas.height) py += 50;
	});

setInterval(update, 100);
setInterval(spawnw, 200);
setInterval(spawnw, 400);
setInterval(spawnw, 800);
setInterval(spawnMedkit, 10000);
</script>
</html>
